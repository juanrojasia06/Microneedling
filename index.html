<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terapia de Inducción de Colágeno — Guía de Estudio</title>
<style>
:root{--teal:#028090;--navy:#16314F;--accent:#02C39A;--muted:#6B8FA0;--light:#EDF7F6;--off:#F4FAF9;--dark:#0D1B2A;--red:#C0392B;--purple:#8E44AD;--green:#00897B;--indigo:#1A5276}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--off);color:var(--navy)}
.hdr{background:var(--navy);padding:22px 28px}
.hdr-badge{background:var(--teal);color:#fff;font-size:10px;font-weight:700;padding:2px 14px;border-radius:20px;letter-spacing:2px;text-transform:uppercase;display:inline-block;margin-bottom:8px}
.hdr h1{color:#fff;font-size:22px;font-weight:800;margin-bottom:4px}
.hdr p{color:var(--accent);font-size:13px}
.nav{position:sticky;top:0;background:#fff;border-bottom:2px solid var(--light);z-index:100;display:flex;overflow-x:auto;padding:0 16px}
.nav::-webkit-scrollbar{height:0}
.nb{padding:12px 13px;border:none;background:none;cursor:pointer;color:var(--muted);font-weight:400;border-bottom:3px solid transparent;font-size:12px;white-space:nowrap;transition:all .15s;font-family:inherit}
.nb.active{color:var(--teal);font-weight:700;border-bottom-color:var(--teal)}
main{max-width:860px;margin:0 auto;padding:28px 18px 60px}
.sec{display:none}.sec.active{display:block}
.sb{background:var(--teal);color:#fff;font-size:10px;font-weight:700;padding:3px 14px;border-radius:20px;letter-spacing:2px;text-transform:uppercase;display:inline-block;margin-bottom:10px}
h2.st{font-size:22px;font-weight:800;color:var(--navy);margin:4px 0 6px;line-height:1.25}
p.ss{color:var(--muted);font-size:13px;font-style:italic;line-height:1.6;margin-bottom:28px}
.card{background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:14px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.g3{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.g4{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
.pill{font-size:11px;font-weight:600;padding:3px 12px;border-radius:20px;display:inline-block;margin:3px 4px 3px 0}
.kbox{border-radius:10px;padding:10px 16px;margin-top:12px;font-size:12px;line-height:1.6}
.iw{border-radius:14px;overflow:hidden;margin-bottom:18px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.iw img{width:100%;display:block;max-height:300px;object-fit:cover}
details{margin-bottom:14px}
details .card{margin-bottom:0;cursor:pointer}
summary{display:flex;gap:14px;align-items:flex-start;list-style:none}
summary::-webkit-details-marker{display:none}
.sbadge{color:#fff;border-radius:10px;padding:10px 14px;text-align:center;min-width:88px;flex-shrink:0;font-size:11px;font-weight:800;letter-spacing:1px}
.sarrow{color:var(--muted);font-size:18px;margin-left:auto;flex-shrink:0;margin-top:4px;transition:.2s}
details[open] .sarrow{transform:rotate(180deg)}
.dbody{margin-top:16px;padding-top:16px;border-top:1px solid var(--light)}
.tbtns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.tbtn{padding:7px 16px;border-radius:20px;border:2px solid #ddd;background:#fff;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.tp{display:none}.tp.active{display:block}
.stepn{color:#fff;border-radius:10px;min-width:54px;height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.tag-r{background:#FDECEC;color:var(--red);font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600;display:inline-block;margin:3px 4px 3px 0}
footer{background:var(--navy);padding:14px 28px;text-align:center;color:var(--muted);font-size:11px}
@media print{
  .nav,.hdr-badge{display:none}
  .hdr{padding:12px 0;background:white}.hdr h1{color:var(--navy);font-size:18px}.hdr p{color:var(--teal)}
  .sec{display:block!important}.sec+.sec{page-break-before:always}
  details>*{display:block!important}
  .tp{display:block!important;margin-bottom:20px}
  .tbtns{display:none}
  .iw img{max-height:200px}
  .card{box-shadow:none;border:1px solid #eee}
  footer{display:none}
  body{background:white}
  main{padding:0}
}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-badge">Técnica en Estética · Guía de Estudio</div><h1>Terapia de Inducción de Colágeno</h1><p>Microneedling / Microagujas · Material de referencia completo</p></div>
<nav class="nav" id="nav"></nav>
<main>
  <div id="anatomia" class="sec"></div>
  <div id="funciones" class="sec"></div>

  <div id="protocolo" class="sec"></div>
</main>
<footer>Guía de estudio · Terapia de Inducción de Colágeno · Las profundidades son aproximadas y varían según zona corporal, grosor de la piel y dispositivo utilizado.</footer>

// RENDERS

function setupTabs(btnsId,panesId){
  const bEl=document.getElementById(btnsId);
  if(!bEl) return;
  bEl.querySelectorAll('.tbtn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const col=btn.dataset.color;
      bEl.querySelectorAll('.tbtn').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.borderColor='#ddd';b.style.color=''});
      btn.classList.add('active');btn.style.background=col;btn.style.borderColor=col;btn.style.color='#fff';
      document.getElementById(panesId).querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
      document.getElementById(btn.dataset.tab).classList.add('active');
    });
  });
}
function show(id){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  window.scrollTo(0,0);
}
window.addEventListener('DOMContentLoaded',()=>{
  const nav=document.getElementById('nav');
  NAV.forEach(n=>{const b=document.createElement('button');b.className='nb';b.dataset.id=n.id;b.textContent=n.icon+' '+n.l;b.addEventListener('click',()=>show(n.id));nav.appendChild(b)});
  NAV.forEach(n=>{document.getElementById(n.id).innerHTML=RENDERS[n.id]()});
  setupTabs('ptabs','ppanes');
  setupTabs('atabs','apanes');
  show('anatomia');
});
</script>
